    <linearGradient id="gold" x1="0" x2="1"><stop offset="0" stop-color="#f5d56f"/><stop offset="1" stop-color="#c99b2e"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/></filter>
